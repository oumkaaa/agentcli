name: ✨ Feature Request / 功能建议
description: 提交一个功能建议或改进想法
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        提交前请：
        - ✅ 搜索过 [现有 Issue](https://github.com/can4hou6joeng4/boss-agent-cli/issues?q=is%3Aissue) 确认无重复
        - ✅ 查看过 [ROADMAP.md](https://github.com/can4hou6joeng4/boss-agent-cli/blob/master/ROADMAP.md) 了解路线图

  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前检查
      options:
        - label: 已搜索现有 Issue 确认无重复
          required: true
        - label: 已查看 ROADMAP.md 确认不在规划中
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 你当前遇到了什么问题或不便？
      placeholder: "目前投递转化漏斗只输出 JSON，Agent 友好但不便人工快速浏览"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 功能描述
      description: 你希望添加什么功能？
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: 使用场景
      description: 在什么场景下需要这个功能？谁会用？用多频繁？
    validations:
      required: true

  - type: textarea
    id: expected_interface
    attributes:
      label: 期望的命令格式
      description: 你期望的命令和输出格式（具体到参数名、输出字段）
      render: bash
      placeholder: |
        boss stats --format html -o report.html
        # 生成自包含 HTML 漏斗报表

  - type: dropdown
    id: platform
    attributes:
      label: 目标平台 / Target platform
      options:
        - zhipin
        - zhilian
        - all platforms
        - not platform-specific
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: 目标角色 / Target role
      options:
        - candidate
        - recruiter
        - both
        - not role-specific
    validations:
      required: true

  - type: textarea
    id: agent_contract
    attributes:
      label: Agent 契约影响
      description: 描述期望的 JSON 信封字段、schema 暴露方式、错误码或 MCP/Skill 影响
      placeholder: |
        - 新命令会出现在 boss schema --format native
        - stdout 仍只输出 JSON 信封
        - 失败错误码为 NOT_SUPPORTED

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些其他方案？为什么不选它们？

  - type: dropdown
    id: priority
    attributes:
      label: 重要程度
      options:
        - 关键（阻塞日常使用）
        - 重要（显著提升体验）
        - 一般（锦上添花）
    validations:
      required: true

  - type: dropdown
    id: willing_to_contribute
    attributes:
      label: 是否愿意贡献 PR
      description: 带 "是" 的 Feature Request 会被优先响应
      options:
        - 是 — 我可以提 PR
        - 是 — 我可以提 PR 但需要设计指导
        - 否 — 仅提出建议
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 参考链接、截图、类似项目对比等
